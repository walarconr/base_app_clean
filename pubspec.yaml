name: clean_architecture_app
description: A Flutter application with Clean Architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1
  
  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  
  # Navigation
  go_router: ^14.0.0
  
  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.0
  
  # Utilities
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.19.0
  uuid: ^4.5.2
  
  # Forms & Validation
  reactive_forms: ^17.0.0

  # Network Monitoring
  connectivity_plus: ^6.0.0

  # App info
  package_info_plus: ^8.0.0

  # Image caching
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  mocktail: ^1.0.0

flutter:
  uses-material-design: true